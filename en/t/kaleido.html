<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Kaleidoscope</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none;background:#07050e;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,sans-serif;
    color:#e8e2ff;touch-action:none;user-select:none}
  #cv{display:block;position:fixed;inset:0}
  .title{position:fixed;top:15px;left:18px;z-index:5;pointer-events:none}
  .title b{font-size:19px;font-weight:800;letter-spacing:2px}
  .title span{display:block;font-size:12px;opacity:.55;margin-top:3px;font-weight:600;letter-spacing:.5px}
  .bar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:6;
    display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:96vw;
    background:rgba(20,14,38,.62);border:1px solid rgba(150,120,255,.22);
    padding:8px 12px;border-radius:16px;backdrop-filter:blur(12px);
    box-shadow:0 10px 34px rgba(60,20,120,.35)}
  .bar button{font:inherit;font-weight:700;font-size:13px;color:#e8e2ff;
    border:1px solid rgba(160,130,255,.28);background:rgba(255,255,255,.05);
    padding:8px 13px;border-radius:11px;cursor:pointer;transition:transform .08s,background .15s}
  .bar button:hover{background:rgba(160,130,255,.22)}
  .bar button:active{transform:translateY(1px)}
  .bar button.on{background:linear-gradient(90deg,#7b5cff,#c05cff);border-color:transparent}
  .sym{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;opacity:.9}
  .sym input{width:108px;accent-color:#a97bff}
  .sym b{min-width:22px;text-align:center;color:#d9c6ff}
  /* sits under the title — the bottom bar used to cover it */
  .hint{position:fixed;left:18px;top:64px;z-index:7;
    font-size:13px;font-weight:600;opacity:.5;pointer-events:none;letter-spacing:.5px;
    transition:opacity .6s;white-space:nowrap}
  @media (max-width:520px){
    .bar{gap:6px;padding:6px 8px}
    .bar button{font-size:12px;padding:7px 9px}
    .sym{font-size:12px} .sym input{width:76px}
  }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="title"><b>Kaleidoscope</b><span>move your finger, grow a mandala that draws itself</span></div>
<div class="hint" id="hint">✦ swipe around the screen ✦</div>
<div class="bar">
  <div class="sym">petals <input id="sym" type="range" min="3" max="16" value="8"><b id="symv">8</b></div>
  <button id="mirror" class="on">🪞 mirror</button>
  <button id="auto" class="on">🌀 auto</button>
  <button id="clear">🧹 clear</button>
  <button id="save">💾 save</button>
</div>
<script>
(()=>{
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,dpr=1,cx=0,cy=0,R=0;
function resize(){
  const nW=window.innerWidth||document.documentElement.clientWidth||800;
  const nH=window.innerHeight||document.documentElement.clientHeight||600;
  if(nW===W && nH===H) return;               // nothing changed → don't wipe the drawing
  let old=null;                               // keep what's already drawn
  if(W){ old=document.createElement('canvas'); old.width=cv.width; old.height=cv.height;
         old.getContext('2d').drawImage(cv,0,0); }
  const oW=W, oH=H;
  dpr=Math.min(window.devicePixelRatio||1,2); W=nW; H=nH;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  cx=W/2; cy=H/2; R=Math.min(W,H);
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='#07050e'; ctx.fillRect(0,0,W,H);
  if(old) ctx.drawImage(old,(W-oW)/2,(H-oH)/2,oW,oH);  // re-center the old mandala
}
window.addEventListener('resize',resize); resize();

let SYM=8, MIRROR=true, AUTO=true;
let hue=0;

// mirrored stroke drawing (dihedral symmetry) with additive glow
function drawSeg(x0,y0,x1,y1,h,w){
  const ax0=x0-cx, ay0=y0-cy, ax1=x1-cx, ay1=y1-cy;
  const step=Math.PI*2/SYM;
  ctx.globalCompositeOperation='lighter';
  ctx.lineCap='round';
  const passes=[[w*2.4,0.10],[w,0.34],[w*0.4,0.95]];
  for(let k=0;k<SYM;k++){
    const c=Math.cos(k*step), s=Math.sin(k*step);
    for(let m=0;m<(MIRROR?2:1);m++){
      const my=m? -1:1;
      const rx0=(ax0*my)*c-(ay0)* s + cx; // rotate (ax0*.., ay0..) but mirror on x-axis => (x, -y)
      // apply mirror first (x, my*y) then rotate
      const px0=ax0, py0=ay0*my, px1=ax1, py1=ay1*my;
      const X0=px0*c-py0*s+cx, Y0=px0*s+py0*c+cy;
      const X1=px1*c-py1*s+cx, Y1=px1*s+py1*c+cy;
      for(const [lw,al] of passes){
        ctx.lineWidth=lw;
        ctx.strokeStyle='hsla('+h+',95%,'+(al>0.9?78:58)+'%,'+al+')';
        ctx.beginPath(); ctx.moveTo(X0,Y0); ctx.lineTo(X1,Y1); ctx.stroke();
      }
    }
  }
  ctx.globalCompositeOperation='source-over';
}

// pen state
let pen={x:cx,y:cy,has:false};
let pointerDown=false, lastInput=-9999, t=0;
let autoPrev=null;

function feed(x,y,speed){
  if(pen.has){
    const w=Math.max(1.7, 4.2 - speed*0.012);
    drawSeg(pen.x,pen.y,x,y,hue%360,w);
  }
  pen.x=x; pen.y=y; pen.has=true;
}

// input
function onDown(x,y){ pointerDown=true; lastInput=t; pen.has=false; feed(x,y,0); hideHint(); }
function onMove(x,y){ if(!pointerDown)return; lastInput=t;
  const sp=Math.hypot(x-pen.x,y-pen.y); feed(x,y,sp); }
function onUp(){ pointerDown=false; pen.has=false; }
cv.addEventListener('pointerdown',e=>{e.preventDefault();cv.setPointerCapture(e.pointerId);onDown(e.clientX,e.clientY);});
cv.addEventListener('pointermove',e=>{onMove(e.clientX,e.clientY);});
cv.addEventListener('pointerup',onUp);
cv.addEventListener('pointercancel',onUp);

// loop
let last=performance.now();
function stepFrame(dt){
  t+=dt;
  // gentle fade so the mandala breathes
  ctx.globalCompositeOperation='source-over';
  // fade per SECOND, not per frame, so 60Hz and 120Hz screens look the same as this one
  ctx.fillStyle='rgba(7,5,14,'+(0.3*dt).toFixed(4)+')'; ctx.fillRect(0,0,W,H);
  hue+=dt*30;
  // auto living pen when idle
  if(AUTO && (t-lastInput)>1.4 && !pointerDown){
    const r=R*(0.16+0.30*(0.5+0.5*Math.sin(t*0.63))+0.12*Math.sin(t*1.7+1));
    const a=t*0.55+1.6*Math.sin(t*0.21);
    const x=cx+Math.cos(a)*r, y=cy+Math.sin(a)*r;
    if(!autoPrev){autoPrev=true; pen.has=false;}
    const sp=Math.hypot(x-pen.x,y-pen.y);
    feed(x,y,sp);
  } else { autoPrev=false; }
}
function frame(now){
  const dt=Math.min((now-last)/1000,0.05); last=now;
  stepFrame(dt);
  requestAnimationFrame(frame);
}

// hint
let hintGone=false;
function hideHint(){ if(hintGone)return; hintGone=true; document.getElementById('hint').style.opacity=0; }

// controls
const symEl=document.getElementById('sym'), symv=document.getElementById('symv');
symEl.addEventListener('input',()=>{SYM=+symEl.value; symv.textContent=SYM;});
document.getElementById('mirror').onclick=e=>{MIRROR=!MIRROR; e.target.classList.toggle('on',MIRROR);};
document.getElementById('auto').onclick=e=>{AUTO=!AUTO; e.target.classList.toggle('on',AUTO); if(AUTO)lastInput=t-2;};
document.getElementById('clear').onclick=()=>{ctx.globalCompositeOperation='source-over';ctx.fillStyle='#07050e';ctx.fillRect(0,0,W,H);pen.has=false;};
document.getElementById('save').onclick=()=>{
  const a=document.createElement('a'); a.download='kaleidoscope.png'; a.href=cv.toDataURL('image/png'); a.click();
};

requestAnimationFrame(frame);
})();
</script>
</body>
</html>
