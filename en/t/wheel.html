<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Spin Wheel</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none;background:#fff3e0;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,sans-serif;
    color:#5a4636;touch-action:none;user-select:none}
  #cv{display:block;position:fixed;inset:0}
  .title{position:fixed;top:15px;left:18px;z-index:5;pointer-events:none}
  .title b{font-size:19px;font-weight:800;letter-spacing:1px;text-shadow:0 1px 0 rgba(255,255,255,.7)}
  .title span{display:block;font-size:12px;opacity:.6;margin-top:2px;font-weight:600}
  .hint{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:4;font-size:14px;font-weight:700;opacity:.7;pointer-events:none;transition:opacity .6s;white-space:nowrap;text-shadow:0 1px 0 rgba(255,255,255,.6)}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="title"><b>Spin Wheel</b><span>give it a flick, see where it lands</span></div>
<div class="hint" id="hint">👆 tap it, or flick it to spin longer</div>
<script>
(()=>{
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,dpr=1,cx=0,cy=0,R=0;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth||document.documentElement.clientWidth||800;
  H=window.innerHeight||document.documentElement.clientHeight||600;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  cx=W/2; cy=H*0.5+10; R=Math.min(W*0.44,H*0.36);
}
window.addEventListener('resize',resize); resize();

let actx=null,master=null;
function initAudio(){ if(actx)return; try{actx=new(window.AudioContext||window.webkitAudioContext)();master=actx.createGain();master.gain.value=0.5;master.connect(actx.destination);}catch(e){} }
function tick(){ if(!actx)return;const t=actx.currentTime;const o=actx.createOscillator();o.type='square';o.frequency.value=1200;const g=actx.createGain();g.gain.setValueAtTime(0.14,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.04);o.connect(g);g.connect(master);o.start(t);o.stop(t+0.05);}
function fanfare(){ if(!actx)return;const t=actx.currentTime;[0,4,7,12].forEach((s,i)=>{const o=actx.createOscillator();o.type='triangle';o.frequency.value=523*Math.pow(2,s/12);const g=actx.createGain();g.gain.setValueAtTime(0.0001,t+i*0.09);g.gain.exponentialRampToValueAtTime(0.3,t+i*0.09+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+i*0.09+0.4);o.connect(g);g.connect(master);o.start(t+i*0.09);o.stop(t+i*0.09+0.42);});}

const SLICES=[['my treat','#ff6b8a'],['free meal','#ffb04d'],['extra fries','#ffd23d'],['spin again','#6fd18b'],['thanks for playing','#4dc4ff'],['cheers','#9a86ff'],['free hug','#ff8fd0'],['jackpot🎉','#ff5a5a']];
const N=SLICES.length, SA=Math.PI*2/N;
let angle=0, av=0, spinning=false, pendingRespin=false, result=-1, confetti=[], t=0, lastSliceAt=-1;
const PTR=-Math.PI/2; // pointer at top

function winnerIndex(){ let a=(PTR-angle)%(Math.PI*2); if(a<0)a+=Math.PI*2; return Math.floor(a/SA)%N; }
function spin(power,dir){ initAudio(); if(actx&&actx.state==='suspended')actx.resume();
  av=Math.max(Math.abs(av), 14+Math.random()*10+Math.min(18,power||0))*(dir||1); spinning=true; result=-1; }

function update(dt){
  if(spinning){ angle+=av*dt; av*=Math.pow(0.35,dt); if(Math.abs(av)<0.15){ av=0; spinning=false; result=winnerIndex();
      if(SLICES[result][0]==='spin again'){ pendingRespin=true; setTimeout(()=>{pendingRespin=false;spin(6);},500); } else { fanfare(); burst(); } }
    const w=winnerIndex(); if(w!==lastSliceAt){ lastSliceAt=w; tick(); }
  }
  for(let i=confetti.length-1;i>=0;i--){const p=confetti[i];p.life-=dt;p.vy+=520*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.rot+=p.rv*dt;if(p.life<=0)confetti.splice(i,1);}
}
function burst(){ for(let i=0;i<120;i++){const a=Math.random()*6.28,s=180+Math.random()*380;confetti.push({x:W/2,y:H*0.35,vx:Math.cos(a)*s,vy:Math.sin(a)*s-180,life:1.6,hue:(Math.random()*360)|0,rot:Math.random()*6.28,rv:(Math.random()-.5)*10});} }

function draw(){
  ctx.fillStyle='#fff3e0'; ctx.fillRect(0,0,W,H);
  // wheel
  ctx.save();
  ctx.shadowColor='rgba(120,80,40,.25)';ctx.shadowBlur=24;ctx.shadowOffsetY=8;
  ctx.beginPath();ctx.arc(cx,cy,R+8,0,6.28);ctx.fillStyle='#fff';ctx.fill();
  ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  for(let i=0;i<N;i++){ const a0=angle+i*SA, a1=a0+SA;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,a0,a1);ctx.closePath();
    ctx.fillStyle=SLICES[i][1]; if(result===i){ctx.fillStyle=lighten(SLICES[i][1]);} ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=2;ctx.stroke();
    // label (flip left-half so it always reads outward-upright)
    ctx.save();ctx.translate(cx,cy);const mid=a0+SA/2;ctx.rotate(mid);ctx.textBaseline='middle';
    ctx.fillStyle='#fff';ctx.font='800 '+Math.max(14,R*0.09)+'px -apple-system,sans-serif';
    ctx.shadowColor='rgba(0,0,0,.2)';ctx.shadowBlur=3;
    const m=((mid%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
    if(m>Math.PI/2 && m<Math.PI*1.5){ ctx.rotate(Math.PI); ctx.textAlign='left'; ctx.fillText(SLICES[i][0], -(R-14), 0); }
    else { ctx.textAlign='right'; ctx.fillText(SLICES[i][0], R-14, 0); }
    ctx.restore();
  }
  // hub
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx,cy,R*0.14,0,6.28);ctx.fill();
  ctx.strokeStyle='#ffcf5e';ctx.lineWidth=4;ctx.stroke();
  ctx.fillStyle='#ff8a3d';ctx.font='800 '+Math.floor(R*0.11)+'px -apple-system,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('spin',cx,cy+1);
  ctx.restore();
  // pointer (top, pointing down)
  ctx.fillStyle='#e8433a';ctx.beginPath();ctx.moveTo(cx-16,cy-R-14);ctx.lineTo(cx+16,cy-R-14);ctx.lineTo(cx,cy-R+14);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
  // confetti
  for(const p of confetti){ctx.save();ctx.globalAlpha=Math.max(0,p.life/1.6);ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle='hsl('+p.hue+',90%,60%)';ctx.fillRect(-4,-4,8,8);ctx.restore();}
  // result banner
  if(result>=0 && SLICES[result][0]!=='spin again'){ ctx.fillStyle='#5a4636';ctx.font='800 34px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText('🎊 '+SLICES[result][0]+' 🎊',W/2,cy-R-40); }
  ctx.textAlign='left';
}
function lighten(hex){const n=parseInt(hex.slice(1),16);let r=Math.min(255,(n>>16)+60),g=Math.min(255,((n>>8)&255)+60),b=Math.min(255,(n&255)+60);return 'rgb('+r+','+g+','+b+')';}
let last=performance.now();
function frame(now){ const dt=Math.min((now-last)/1000,0.04); last=now; t+=dt; update(dt); draw(); requestAnimationFrame(frame); }

let drag=null;
cv.addEventListener('pointerdown',e=>{e.preventDefault(); if(spinning||pendingRespin)return;
  drag={a:Math.atan2(e.clientY-cy,e.clientX-cx),t:performance.now(),v:0,moved:0}; hideHint(); });
cv.addEventListener('pointermove',e=>{ if(!drag)return; e.preventDefault();
  const a=Math.atan2(e.clientY-cy,e.clientX-cx), now=performance.now();
  let d=a-drag.a; while(d>Math.PI)d-=Math.PI*2; while(d<-Math.PI)d+=Math.PI*2;
  angle+=d; drag.moved+=Math.abs(d);
  drag.v=drag.v*0.5+(d/Math.max(0.008,(now-drag.t)/1000))*0.5;
  drag.a=a; drag.t=now; });
function release(){ if(!drag)return; const flick=drag.moved>0.08?drag.v:0; drag=null;
  spin(Math.abs(flick), flick<-0.5?-1:1); }
addEventListener('pointerup',release);
addEventListener('pointercancel',release);
let hintGone=false; function hideHint(){if(hintGone)return;hintGone=true;document.getElementById('hint').style.opacity=0;}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
