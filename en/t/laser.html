<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Laser</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none;background:#070910;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,sans-serif;
    color:#d6e2ff;touch-action:none;user-select:none}
  #cv{display:block;position:fixed;inset:0}
  .title{position:fixed;top:15px;left:18px;z-index:5;pointer-events:none}
  .title b{font-size:19px;font-weight:800;letter-spacing:4px}
  .title span{display:block;font-size:12px;opacity:.55;margin-top:3px;font-weight:600;letter-spacing:1px}
  .bar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:6;display:flex;gap:8px;
    background:rgba(16,20,34,.5);border:1px solid rgba(120,170,255,.2);padding:8px 12px;border-radius:15px;backdrop-filter:blur(10px)}
  .bar button{font:inherit;font-weight:700;font-size:13px;color:#d6e2ff;border:1px solid rgba(140,180,255,.25);background:rgba(255,255,255,.05);padding:8px 13px;border-radius:11px;cursor:pointer}
  .hint{position:fixed;left:50%;bottom:78px;transform:translateX(-50%);z-index:4;font-size:13px;font-weight:600;opacity:.6;pointer-events:none;transition:opacity .6s;white-space:nowrap}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="title"><b>Laser</b><span>drag and turn mirrors, steer the beam onto the crystal</span></div>
<div class="hint" id="hint">🔦 drag a mirror, or grab the laser to aim it</div>
<div class="bar"><button id="add">＋ mirror</button><button id="reset">↻ reset</button></div>
<script>
(()=>{
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,dpr=1;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  const oW=W,oH=H;
  W=window.innerWidth||document.documentElement.clientWidth||800;
  H=window.innerHeight||document.documentElement.clientHeight||600;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  // keep the hint clear of the control bar whatever height it wraps to
  document.getElementById('hint').style.bottom=(document.querySelector('.bar').offsetHeight+26)+'px';
  // keep the scene on screen: rescale everything by the size ratio
  if(oW>0&&oH>0&&mirrors){ const sx=W/oW, sy=H/oH;
    src.x*=sx; src.y*=sy; target.x*=sx; target.y*=sy;
    for(const m of mirrors){ m.ax*=sx; m.ay*=sy; m.bx*=sx; m.by*=sy; } }
}
window.addEventListener('resize',resize);

let src, mirrors, target;
function reset(){
  src={x:W*0.1,y:H*0.5,ang:-0.15};
  mirrors=[
    {ax:W*0.34,ay:H*0.28,bx:W*0.34,by:H*0.52},
    {ax:W*0.55,ay:H*0.62,bx:W*0.72,by:H*0.5},
    {ax:W*0.62,ay:H*0.22,bx:W*0.8,by:H*0.32},
  ];
  target={x:W*0.86,y:H*0.68,r:20,hit:0};
  flash=0;
}
let flash=0, wasHit=0;
resize(); reset();

function cross(ax,ay,bx,by){return ax*by-ay*bx;}
function raySeg(ox,oy,dx,dy,ax,ay,bx,by){
  const ex=bx-ax,ey=by-ay; const den=dx*ey-dy*ex; if(Math.abs(den)<1e-9)return null;
  const t=((ax-ox)*ey-(ay-oy)*ex)/den; const u=((ax-ox)*dy-(ay-oy)*dx)/den;
  if(t>1e-4&&u>=0&&u<=1){ let nx=-ey,ny=ex; const nl=Math.hypot(nx,ny)||1; return {t,x:ox+dx*t,y:oy+dy*t,nx:nx/nl,ny:ny/nl}; }
  return null;
}
function trace(){
  let ox=src.x,oy=src.y,dx=Math.cos(src.ang),dy=Math.sin(src.ang);
  const pts=[[ox,oy]]; target.hit=0;
  const edges=[[0,0,W,0],[W,0,W,H],[W,H,0,H],[0,H,0,0]];
  for(let b=0;b<48;b++){
    let best=null,bt=Infinity,isMirror=false;
    for(const m of mirrors){ const h=raySeg(ox,oy,dx,dy,m.ax,m.ay,m.bx,m.by); if(h&&h.t<bt){bt=h.t;best=h;isMirror=true;} }
    for(const e of edges){ const h=raySeg(ox,oy,dx,dy,e[0],e[1],e[2],e[3]); if(h&&h.t<bt){bt=h.t;best=h;isMirror=false;} }
    if(!best){ pts.push([ox+dx*3000,oy+dy*3000]); break; }
    // crystal check: proper ray-circle hit, beam stops inside the crystal
    const tx=ox-target.x, ty=oy-target.y;
    const bq=tx*dx+ty*dy, cq=tx*tx+ty*ty-target.r*target.r, disc=bq*bq-cq;
    if(disc>0){ const th=-bq-Math.sqrt(disc);
      if(th>1e-4&&th<bt){ target.hit=1; pts.push([ox+dx*th,oy+dy*th]); break; } }
    pts.push([best.x,best.y]);
    if(!isMirror) break;
    const dot=dx*best.nx+dy*best.ny; dx=dx-2*dot*best.nx; dy=dy-2*dot*best.ny;
    ox=best.x+dx*0.5; oy=best.y+dy*0.5;
  }
  return pts;
}
function draw(){
  ctx.fillStyle='#070910'; ctx.fillRect(0,0,W,H);
  const pts=trace();
  // beam glow (additive)
  ctx.globalCompositeOperation='lighter'; ctx.lineCap='round'; ctx.lineJoin='round';
  const passes=[[9,'rgba(80,200,255,.12)'],[4,'rgba(120,220,255,.28)'],[1.6,'rgba(220,250,255,.95)']];
  for(const [lw,col] of passes){ ctx.lineWidth=lw; ctx.strokeStyle=col; ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]); for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]); ctx.stroke(); }
  // hit sparkle points at bounces
  for(let i=1;i<pts.length-1;i++){ ctx.fillStyle='rgba(200,245,255,.9)'; ctx.beginPath();ctx.arc(pts[i][0],pts[i][1],3,0,6.28);ctx.fill(); }
  ctx.globalCompositeOperation='source-over';
  // mirrors
  for(const m of mirrors){
    ctx.strokeStyle='rgba(200,215,240,.9)'; ctx.lineWidth=5; ctx.lineCap='round';
    ctx.shadowColor='rgba(160,200,255,.5)';ctx.shadowBlur=6;
    ctx.beginPath();ctx.moveTo(m.ax,m.ay);ctx.lineTo(m.bx,m.by);ctx.stroke(); ctx.shadowBlur=0;
    // back tint
    ctx.strokeStyle='rgba(90,110,150,.6)';ctx.lineWidth=2; ctx.beginPath();ctx.moveTo(m.ax,m.ay);ctx.lineTo(m.bx,m.by);ctx.stroke();
    for(const p of [[m.ax,m.ay],[m.bx,m.by]]){ ctx.fillStyle='#9fd0ff'; ctx.beginPath();ctx.arc(p[0],p[1],6,0,6.28);ctx.fill(); ctx.fillStyle='#0a1020';ctx.beginPath();ctx.arc(p[0],p[1],2.5,0,6.28);ctx.fill(); }
  }
  // target crystal
  if(target.hit&&!wasHit) flash=1; wasHit=target.hit;
  ctx.save(); ctx.translate(target.x,target.y); ctx.rotate(0.4);
  if(flash>0){ // celebration burst on the moment of the hit
    ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle='rgba(140,255,210,'+flash*0.9+')'; ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(0,0,target.r+(1-flash)*46,0,6.28);ctx.stroke();
    for(let i=0;i<8;i++){ const a=i/8*6.28, r0=target.r+(1-flash)*22;
      ctx.beginPath();ctx.moveTo(Math.cos(a)*r0,Math.sin(a)*r0);
      ctx.lineTo(Math.cos(a)*(r0+12*flash),Math.sin(a)*(r0+12*flash));ctx.stroke(); }
    ctx.globalCompositeOperation='source-over'; flash=Math.max(0,flash-0.045);
  }
  ctx.shadowColor='rgba(120,255,200,'+(target.hit?1:0.35)+')'; ctx.shadowBlur=target.hit?30:12;
  // 12-vertex six-point star so it reads as a gem, not a triangle
  ctx.fillStyle=target.hit?'#6affc0':'#2f7a63'; ctx.beginPath();
  for(let i=0;i<12;i++){ const a=i/12*6.283185; const r=target.r*(i%2?0.55:1);
    const x=Math.cos(a)*r,y=Math.sin(a)*r; i?ctx.lineTo(x,y):ctx.moveTo(x,y); }
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0; ctx.strokeStyle=target.hit?'rgba(210,255,235,.95)':'rgba(130,220,190,.6)';
  ctx.lineWidth=1.5; ctx.stroke();
  ctx.restore();
  // source
  ctx.fillStyle='#ff5a6a'; ctx.save();ctx.translate(src.x,src.y);ctx.rotate(src.ang);
  ctx.beginPath();ctx.moveTo(-14,-11);ctx.lineTo(16,0);ctx.lineTo(-14,11);ctx.closePath();ctx.fill();
  ctx.fillStyle='#ffd0d5';ctx.beginPath();ctx.arc(10,0,3.5,0,6.28);ctx.fill();
  ctx.restore();
  // aim handle
  const hx=src.x+Math.cos(src.ang)*46, hy=src.y+Math.sin(src.ang)*46;
  ctx.strokeStyle='rgba(255,150,160,.5)';ctx.lineWidth=1.5;ctx.setLineDash([3,4]);ctx.beginPath();ctx.moveTo(src.x,src.y);ctx.lineTo(hx,hy);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,150,160,.8)';ctx.beginPath();ctx.arc(hx,hy,7,0,6.28);ctx.fill();
}
let last=performance.now();
function frame(now){ last=now; draw(); requestAnimationFrame(frame); }

// ---- input ----
let grab=null;
function near(x,y,px,py,r){return (x-px)**2+(y-py)**2<r*r;}
function distSeg(x,y,ax,ay,bx,by){const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy||1;let t=((x-ax)*dx+(y-ay)*dy)/l2;t=Math.max(0,Math.min(1,t));return Math.hypot(x-(ax+dx*t),y-(ay+dy*t));}
function pick(x,y){
  const hx=src.x+Math.cos(src.ang)*46, hy=src.y+Math.sin(src.ang)*46;
  if(near(x,y,hx,hy,16)) return {type:'aim'};
  for(let i=0;i<mirrors.length;i++){ const m=mirrors[i];
    if(near(x,y,m.ax,m.ay,14))return{type:'end',m,e:'a'}; if(near(x,y,m.bx,m.by,14))return{type:'end',m,e:'b'};
    if(distSeg(x,y,m.ax,m.ay,m.bx,m.by)<12)return{type:'mir',m,ox:x,oy:y}; }
  if(near(x,y,src.x,src.y,22))return{type:'src'};
  return null;
}
cv.addEventListener('pointerdown',e=>{e.preventDefault();cv.setPointerCapture(e.pointerId);grab=pick(e.clientX,e.clientY);hideHint();});
cv.addEventListener('pointermove',e=>{ if(!grab)return; const x=e.clientX,y=e.clientY;
  if(grab.type==='aim'){ src.ang=Math.atan2(y-src.y,x-src.x); }
  else if(grab.type==='src'){ src.x=x;src.y=y; }
  else if(grab.type==='end'){ if(grab.e==='a'){grab.m.ax=x;grab.m.ay=y;}else{grab.m.bx=x;grab.m.by=y;} }
  else if(grab.type==='mir'){ const dx=x-grab.ox,dy=y-grab.oy; grab.m.ax+=dx;grab.m.ay+=dy;grab.m.bx+=dx;grab.m.by+=dy; grab.ox=x;grab.oy=y; }
});
cv.addEventListener('pointerup',()=>grab=null);
cv.addEventListener('pointercancel',()=>grab=null);
let hintGone=false; function hideHint(){if(hintGone)return;hintGone=true;document.getElementById('hint').style.opacity=0;}
const addBtn=document.getElementById('add');
function syncAdd(){ const full=mirrors.length>=10; addBtn.disabled=full; addBtn.style.opacity=full?0.4:1; }
addBtn.onclick=()=>{ if(mirrors.length>=10)return;
  const k=mirrors.length, a=k*1.1, ux=W*0.42+Math.cos(a)*W*0.1, uy=H*0.38+Math.sin(a)*H*0.16;
  mirrors.push({ax:ux,ay:uy,bx:ux+Math.cos(a+1.6)*W*0.08,by:uy+Math.sin(a+1.6)*W*0.08}); syncAdd(); };
document.getElementById('reset').onclick=()=>{ reset(); syncAdd(); };
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
