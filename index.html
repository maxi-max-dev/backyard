.f .n{opacity:.5;margin-left:5px;font-weight:600}

.toy{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:17px 16px 15px;

.toy .top{display:flex;align-items:flex-start;justify-content:space-between}

@media (max-width:640px){

</style>

$('#filters').innerHTML=CATS.map((c,i)=>
  `<button class="f${i===0?' on':''}" data-c="${c}">${c}<span class="n">${count(c)}</span></button>`).join('');

$('#grid').innerHTML=TOYS.map(([i,slug,em,cn,en,cat,desc])=>`
  <a class="toy" data-c="${cat}" href="t/${slug}.html">
    <div class="top"><span class="em">${em}</span><span class="idx">${String(i).padStart(2,'0')}</span></div>
    <h4>${cn}</h4>
    <div class="en">${en}</div>
    <p>${desc}</p>
    <div class="tag">${cat}</div>
  </a>`).join('');

$('#filters').addEventListener('click',e=>{
  const b=e.target.closest('.f'); if(!b) return;
  document.querySelectorAll('.f').forEach(x=>x.classList.toggle('on',x===b));
  const c=b.dataset.c;
  document.querySelectorAll('.toy').forEach(t=>
    t.classList.toggle('hide', c!=='全部' && t.dataset.c!==c));
});
</script>
</body>
</html>
